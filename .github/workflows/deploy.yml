name: Deploy to Production Server

on:
  push:
    branches:
      - main # Change to your default branch if different

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Enable Next.js build caching
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            #!/bin/bash
            set -e

            echo "=== Loading environment ==="

            # Method 1: Use env command to get login shell environment
            if [ -f /etc/environment ]; then
              set -a
              source /etc/environment
              set +a
            fi

            # Method 2: Load bashrc for interactive commands
            if [ -f ~/.bashrc ]; then
              source ~/.bashrc
            fi

            # Method 3: Load profile
            if [ -f ~/.profile ]; then
              source ~/.profile
            fi

            # Method 4: Load NVM if exists
            if [ -d "$HOME/.nvm" ]; then
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            fi

            # Method 5: Add common paths
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:$HOME/.npm-global/bin:$HOME/node_modules/.bin:$PATH"

            echo "=== Debug info ==="
            echo "User: $(whoami)"
            echo "Home: $HOME"
            echo "Node: $(which node 2>/dev/null || echo 'not found')"
            echo "NPM: $(which npm 2>/dev/null || echo 'not found')"
            echo "NPX: $(which npx 2>/dev/null || echo 'not found')"
            echo "PM2: $(which pm2 2>/dev/null || echo 'not found')"
            echo "PATH: $PATH"
            echo "=================="

            cd /var/www/water_tank-app

            # Pull latest changes
            git pull origin main

            # Create .env file from GitHub Secrets
            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NODE_ENV=production
            PORT=3000
            EOF

            # Install ALL dependencies (needed for build)
            echo "Installing dependencies..."
            npm ci

            # Run database migrations
            echo "Running migrations..."
            npx prisma migrate deploy

            # Build Next.js
            echo "Building Next.js..."
            npm run build

            # Restart PM2 application
            echo "Restarting PM2..."
            pm2 reload water_tank-app

            # Save PM2 process list
            pm2 save

            # Show PM2 status
            echo "=== Deployment Complete ==="
            pm2 list
