name: CI / CD

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            .next
            public
            package.json
            package-lock.json
            ecosystem.config.js
            next.config.js

  deploy:
    name: Deploy to DigitalOcean (SSH + pm2)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: deploy

      - name: Rsync files to server (/var/www/water_tank-app)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync
          SSH_PORT=${{ secrets.SSH_PORT || '22' }}
          SSH_USER=${{ secrets.SSH_USER }}
          SSH_HOST=${{ secrets.SSH_HOST }}
          SSH_PW=${{ secrets.SSH_PASSWORD }}
          REMOTE_PATH=/var/www/water_tank-app/
          mkdir -p deploy
          # Use sshpass to provide password non-interactively to rsync
          sshpass -p "$SSH_PW" rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -p $SSH_PORT" deploy/ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"

      - name: Install deps and restart with pm2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/water_tank-app/
            npm ci --only=production
            if command -v pm2 >/dev/null 2>&1; then
              pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            else
              echo "pm2 not installed on target host"
              exit 1
            fi

# Notes:
# - Required repo secrets: SSH_HOST, SSH_USER, SSH_PASSWORD
# - Optional: SSH_PORT (default 22)
# - Ensure target host has Node.js and pm2 installed and the deploy user can write to /var/www/water_tank-app/
